{% extends "shop/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
  <h1>Создать аккаунт</h1>
  
  <!-- Оборачиваем в div с классом login-form для центровки -->
  <div class="login-form">
    <p style="text-align: center;">Пожалуйста, заполните форму ниже:</p>
    
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <p><input type="submit" value="Зарегистрироваться"></p>
    </form>
  </div>
{% endblock %}
